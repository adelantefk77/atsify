                    "surface-container-highest": "#e0e3e5",
                    "surface-bright": "#f7f9fb",
                    "surface": "#f7f9fb",
                    "secondary": "#006c49",
                    "on-secondary-fixed": "#002113",
                    "primary-fixed-dim": "#bec6e0",
                    "inverse-surface": "#2d3133",
                    "on-surface": "#191c1e",
                    "on-primary-fixed": "#131b2e",
                    "on-error-container": "#93000a",
                    "tertiary-container": "#001a42",
                    "inverse-primary": "#bec6e0",
                    "on-secondary-fixed-variant": "#005236",
                    "outline-variant": "#c6c6cd",
                    "primary-container": "#131b2e",
                    "surface-container-lowest": "#ffffff",
                    "primary": "#000000",
                    "secondary-container": "#6cf8bb",
                    "on-error": "#ffffff",
                    "on-tertiary-fixed-variant": "#004395",
                    "background": "#f7f9fb",
                    "on-background": "#191c1e",
                    "error-container": "#ffdad6",
                    "secondary-fixed": "#6ffbbe",
                    "on-primary": "#ffffff",
                    "on-primary-container": "#7c839b",
                    "inverse-on-surface": "#eff1f3",
                    "primary-fixed": "#dae2fd",
                    "tertiary-fixed-dim": "#adc6ff",
                    "on-secondary-container": "#00714d",
                    "surface-container": "#eceef0",
                    "surface-container-high": "#e6e8ea",
                    "tertiary-fixed": "#d8e2ff",

                    "on-surface-variant": "#45464d",
                    "tertiary": "#000000",
                    "on-secondary": "#ffffff",
                    "surface-dim": "#d8dadc",
                    "on-tertiary-fixed": "#001a42"
            },
            "borderRadius": {

                    "lg": "0.5rem",

            "spacing": {

            },
            "fontFamily": {

            },
            "fontSize": {

                    "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],

        }

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }
        .bento-shadow {
            box-shadow: 0px 4px 20px rgba(15, 23, 42, 0.05);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col">
<header class="bg-surface dark:bg-inverse-surface border-b border-outline-variant dark:border-outline z-50 sticky top-0">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-gutter max-w-container-max-width mx-auto h-16">
<div class="flex items-center gap-2">
<a href="/" class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">document_scanner</span>
<span class="text-headline-md font-headline-md font-extrabold text-primary dark:text-inverse-primary tracking-tight">ATSify</span>
</a>
</div>
</div>
</header>
<main class="flex-grow w-full max-w-container-max-width mx-auto px-margin-mobile md:px-gutter py-bento-gap flex flex-col gap-bento-gap">

<section class="col-span-12 glass-panel rounded-xl p-8 flex flex-col md:flex-row items-center justify-between gap-8 bento-shadow relative overflow-hidden">
<div class="absolute top-0 right-0 w-64 h-64 bg-secondary-container rounded-full blur-3xl opacity-20 -mr-20 -mt-20 pointer-events-none"></div>
<div class="flex flex-col gap-2 z-10 text-center md:text-left">
<h1 class="text-headline-lg-mobile md:text-headline-lg font-headline-lg-mobile md:font-headline-lg text-primary">Twój wynik ATS</h1>
<p class="text-body-lg font-body-lg text-on-surface-variant max-w-2xl">
                    Przeanalizowaliśmy Twoje CV. Zoptymalizowana wersja jest teraz dopasowana do systemów rekrutacyjnych i gotowa do wysłania.
                </p>
</div>
<div class="relative w-48 h-48 flex-shrink-0 z-10 flex items-center justify-center">
<svg class="w-full h-full transform -rotate-90" viewbox="0 0 100 100">
<circle class="text-surface-variant" cx="50" cy="50" fill="transparent" r="40" stroke="currentColor" stroke-width="8"></circle>
<circle id="score-circle" class="text-secondary drop-shadow-md" cx="50" cy="50" fill="transparent" r="40" stroke="currentColor" stroke-dasharray="251.2" stroke-dashoffset="251.2" stroke-linecap="round" stroke-width="8"></circle>
</svg>
<div class="absolute flex flex-col items-center justify-center text-center">
<span class="text-display-lg font-display-lg text-primary leading-none" id="score-number">–</span>
<span class="text-label-sm font-label-sm text-on-surface-variant mt-1">/ 100</span>
</div>
</div>
</section>

<div class="grid grid-cols-1 md:grid-cols-12 gap-bento-gap">
<section class="md:col-span-12 flex flex-col gap-6">
<div class="bg-surface-container-lowest rounded-xl p-6 bento-shadow border border-surface-variant flex-grow">
<div class="flex items-center gap-3 mb-6 pb-4 border-b border-surface-variant">
<span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<h2 class="text-headline-md font-headline-md text-primary">Co zostało zmienione</h2>
</div>
<ul class="flex flex-col gap-6" id="changes-list">
</ul>
</div>
</section>
</div>

<section class="flex flex-col sm:flex-row items-center justify-center gap-4 mt-4 mb-8">
<a id="download-link" href="#" class="w-full sm:w-auto bg-primary text-on-primary px-8 py-4 rounded-lg font-headline-md text-body-md hover:-translate-y-0.5 transition-transform duration-200 shadow-md flex items-center justify-center gap-3">
<span class="material-symbols-outlined">download</span>
                Pobierz zoptymalizowane CV (PDF)
            </a>
<a href="/upload" class="w-full sm:w-auto bg-transparent text-primary border-2 border-outline px-8 py-4 rounded-lg font-headline-md text-body-md hover:bg-surface-container-low transition-colors duration-200 flex items-center justify-center gap-3">
<span class="material-symbols-outlined">edit</span>
                Zacznij od nowa
            </a>
</section>
</main>
<footer class="bg-surface-container-low dark:bg-surface-container-highest border-t border-outline-variant dark:border-outline mt-auto">
<div class="w-full py-12 px-margin-mobile md:px-gutter max-w-container-max-width mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
<div class="flex items-center gap-2">
<span class="text-headline-md font-headline-md font-bold text-primary dark:text-inverse-primary">ATSify</span>
</div>
<div class="text-on-surface dark:text-on-surface-variant text-label-sm font-label-sm">
                © 2026 ATSify.
            </div>
</div>
</footer>
<script>
        const raw = sessionStorage.getItem('atsify_result');
        if (!raw) {
            window.location.href = '/upload';
        } else {
            const data = JSON.parse(raw);

            const score = Math.max(0, Math.min(100, Number(data.match_score) || 0));
            document.getElementById('score-number').textContent = score;
            const circumference = 251.2;
            const offset = circumference - (score / 100) * circumference;
            document.getElementById('score-circle').setAttribute('stroke-dashoffset', offset);

            document.getElementById('download-link').setAttribute('href', data.download_url);

            const list = document.getElementById('changes-list');
            const changes = Array.isArray(data.changes) ? data.changes : [];
            if (changes.length === 0) {
                list.innerHTML = '<li class="text-body-md font-body-md text-on-surface-variant">Brak szczegółowej listy zmian.</li>';
            } else {
                changes.forEach((change) => {
                    const li = document.createElement('li');
                    li.className = 'flex items-start gap-4';

                    const iconWrap = document.createElement('div');
                    iconWrap.className = 'w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center flex-shrink-0 mt-0.5';
                    iconWrap.innerHTML = '<span class="material-symbols-outlined text-on-secondary-container text-sm">check</span>';
                    li.appendChild(iconWrap);

                    const content = document.createElement('div');
                    content.className = 'flex flex-col gap-2';

                    const title = document.createElement('span');
                    title.className = 'text-body-md font-body-md font-semibold text-primary';
                    title.textContent = change.title || '';
                    content.appendChild(title);

                    if (change.description) {
                        const desc = document.createElement('p');
                        desc.className = 'text-body-md font-body-md text-on-surface-variant text-sm';
                        desc.textContent = change.description;
                        content.appendChild(desc);
                    }

                    if (Array.isArray(change.keywords) && change.keywords.length > 0) {
                        const chipWrap = document.createElement('div');
                        chipWrap.className = 'flex flex-wrap gap-2 mt-1';
                        change.keywords.forEach((kw) => {
                            const chip = document.createElement('span');
                            chip.className = 'px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full text-label-sm font-label-sm border border-secondary/20';
                            chip.textContent = kw;
                            chipWrap.appendChild(chip);
                        });
                        content.appendChild(chipWrap);
                    }

                    li.appendChild(content);
                    list.appendChild(li);
                });
            }
        }
    </script>
</body></html>
